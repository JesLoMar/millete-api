# =========================================================================
# CONFIGURACIÓN BASE DE LA APLICACIÓN - MILLETE v0.0.2
# =========================================================================
server:
  port: 8080
#  servlet:
#    context-path: /api/v1

spring:
  application:
    name: Millete
  profiles:
    active: dev # Perfil por defecto si se ejecuta en local desde el IDE

  # =============================================
  # JPA / HIBERNATE
  # =============================================
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # =============================================
  # FLYWAY MIGRATIONS
  # =============================================
  flyway:
    enabled: true
    baseline-on-migrate: true

  # =============================================
  # CONEXIÓN A BASE DE DATOS
  # =============================================
  datasource:
    # Soporta tanto DATABASE_URL pura como el estándar de Spring inyectado por Compose
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/millete_db}}
    username: ${SPRING_DATASOURCE_USERNAME:${DATABASE_USER:millete_user}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:changeme_password}}
    driver-class-name: org.postgresql.Driver

  # =============================================
  # SERVICIO DE CORREO (Con fallbacks para evitar bloqueos)
  # =============================================
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:25}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:noreply@millete.online}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# =============================================
# PROPIEDADES DE LA APP (CORS e información)
# =============================================
app:
  version: 0.0.2
  frontend:
    # Esta es la propiedad que tu Bean de CORS debe leer en Java
    url: ${CORS_ALLOWED_ORIGINS:${FRONTEND_URL:http://localhost:3000}}

# =============================================
# SEGURIDAD JWT
# =============================================
jwt:
  # Clave por defecto solo para entorno de desarrollo local (mínimo 64 caracteres)
  secret: ${JWT_SECRET:R2VhRE9uRmluYW5jaWFsTWFuYWdlbWVudFN5c3RlbV9NaWxsZXRlXzIwMjZfVGVzdGluZ0tleQ==}
  expiration: ${JWT_EXPIRATION:43200000} # 12 horas por defecto en milisegundos

# =============================================
# CONFIGURACIÓN DE LOGS (Desarrollo)
# =============================================
logging:
  level:
    root: INFO
    com.puntomartinez: DEBUG