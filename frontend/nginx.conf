worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Configuración de logs
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    # Optimizaciones básicas
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;  # Ocultar versión de Nginx por seguridad
    client_max_body_size 10M;  # Límite para subida de archivos

    # Buffer settings para mejor rendimiento
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    output_buffers 32 32k;
    postpone_output 1460;

    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    # Open file cache
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # =============================================
    # CONFIGURACIÓN GZIP MEJORADA
    # =============================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_disable "msie6";
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/js
        text/x-js
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/rss+xml
        application/xhtml+xml
        application/x-font-ttf
        application/x-font-opentype
        application/vnd.ms-fontobject
        image/svg+xml
        image/x-icon
        font/ttf
        font/opentype
        font/eot
        font/otf;

    # =============================================
    # SERVIDOR PRINCIPAL
    # =============================================
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # =============================================
        # HEALTH CHECK (para Docker)
        # =============================================
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # =============================================
        # NGINX STATUS (monitoreo)
        # =============================================
        location /nginx_status {
            stub_status;
            access_log off;
            allow 127.0.0.1;
            allow 172.0.0.0/8;  # Docker network
            deny all;
        }

        # =============================================
        # API: PROXY INVERSO HACIA EL BACKEND (CORREGIDO)
        # =============================================
        location /api/ {
            # Se elimina la barra y el /api/ final para pasar la ruta completa 
            # limpia e intacta (/api/v1/auth/...) hacia Spring Boot
            proxy_pass http://millete-backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Timeouts optimizados
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # Buffer settings para proxy
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # =============================================
        # SPA: TODAS LAS RUTAS VAN A INDEX.HTML
        # =============================================
        location / {
            try_files $uri $uri/ /index.html;
            
            # Cache para HTML (no cachear para evitar problemas de actualización)
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            
            # Headers de seguridad básicos
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
        }

        # =============================================
        # ASSETS ESTÁTICOS CON CACHE LARGO
        # =============================================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
            access_log off;
            log_not_found off;
            
            etag off;
            if_modified_since off;
        }

        # =============================================
        # ROBOTS Y FAVICON
        # =============================================
        location = /robots.txt {
            access_log off;
            log_not_found off;
        }
        
        location = /favicon.ico {
            access_log off;
            log_not_found off;
            expires 30d;
        }

        # =============================================
        # SEGURIDAD: DENEGAR ACCESO A ARCHIVOS OCULTOS
        # =============================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # =============================================
        # MANEJO DE ERRORES PERSONALIZADO
        # =============================================
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
